[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --timeout=30
    --color=yes
    --strict-markers
markers =
    slow: tests lents (charge, soak)
    security: tests de sécurité
    proctoring: tests proctoring
    auth: tests authentification
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
